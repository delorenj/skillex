# Skills Manifest
# Source of truth for skill organization across CLIs.
# Consumed by: bin/activate-profile, bin/validate-manifest (future), CLI adapters.
#
# Audit date: 2026-04-14 (120 local skills in ~/.agents/skills/)
#
# Rules:
#   - Every subdirectory of ~/.agents/skills/ MUST appear in `always_on.<bucket>`
#     or in a profile's skills list (but not both).
#   - Profiles are mutually exclusive at activation time.
#   - Plugins (CC-specific) are declared for documentation but not enforced.

version: 1

# ─────────────────────────────────────────────────────────────────────────────
