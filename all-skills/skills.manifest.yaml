# ─────────────────────────────────────────────────────────────────────────────
# Profiles: mutually exclusive workflow methodologies.
# Activate exactly one via: ~/.agents/skills/bin/activate-profile <name>
# ─────────────────────────────────────────────────────────────────────────────
profiles:
  bmad:
    description: "BMAD methodology: spec-driven, multi-persona agent workflow"
    source: plugin
    plugin: "bmad@bmad-method"
    skills: []
    conflicts_with:
      - google
      - agent-skills-lifecycle
      - ralph-wiggum

  google:
    description: "Google agent skills lifecycle (~/code/google-agent-skills)"
    source: filesystem
    path: "~/code/google-agent-skills"
    skills: []
    conflicts_with:
      - bmad
      - agent-skills-lifecycle
      - ralph-wiggum

  agent-skills-lifecycle:
    description: "addy-agent-skills plugin lifecycle (idea-refine -> ship)"
    source: plugin
    plugin: "agent-skills@addy-agent-skills"
    skills: []
    conflicts_with:
      - bmad
      - google
      - ralph-wiggum

  ralph-wiggum:
    description: "Autonomous TDD swarm loop with parallel agent evolution"
    source: filesystem
    skills:
      - ralph-wiggum-v2
      - subagent-driven-development
    conflicts_with:
      - bmad
      - google
      - agent-skills-lifecycle

# ─────────────────────────────────────────────────────────────────────────────
# CLI-specific integration hints.
# Used by adapter scripts to know where to symlink the active profile output.
# ─────────────────────────────────────────────────────────────────────────────
cli_targets:
  claude_code: "~/.claude/skills"
  opencode: "~/.config/opencode/skills"
  codex: "~/.config/codex/skills"
  gemini: "~/.config/gemini/skills"

# ─────────────────────────────────────────────────────────────────────────────
# Audit notes (2026-04-14)
# ─────────────────────────────────────────────────────────────────────────────
# Total skills categorized: 120 (118 always-on + 2 in ralph-wiggum profile)
#
# Deprecated skills flagged for review/removal:
#   - digipop-coloring-book-creation (superseded by creating-coloring-books)
#   - hindsight-memory-governance    (consolidated into hindsight)
#
# Skills that could be profile-gated if unused frequently:
#   - clerk.*              (10 skills; only needed on Clerk-using projects)
#   - expo.*               (10 skills; only needed on Expo projects)
#   - react_ecosystem.*    (7 skills; only needed on React projects)
#   - content_creation.*   (7 skills; only when doing creative work)
#
# If context budget becomes a problem, the highest-ROI action is moving the
# above four buckets into filesystem profiles keyed by project type (e.g.
# profile: react-native-app activates clerk + expo + react_ecosystem).
#
# Context cost note: ~120 skills at ~30 tokens/metadata entry ≈ 3.6K tokens
# ALWAYS present in Claude Code context. That's the baseline.
