[env]
_.file = [".env"]
CODEX_HOME = { value = ".codex", path = true }

[hooks]
enter = '{{config_root}}/.mise/scripts/link-agentfiles.sh'

[[watch_files]]
patterns = ["AGENTS.md"]
task = "link-agentfiles"

[tasks.link-agentfiles]
description = "Symlink all agent files to AGENTS.md"
run = "{{config_root}}/.mise/scripts/link-agentfiles.sh"

[tasks.install]
description = "Install dependencies with uv"
run = "uv sync"

[tasks.test]
description = "Run the test suite"
run = "uv run pytest"

[tasks.lint]
description = "Lint with ruff"
run = "uv run ruff check ."

[tasks.fmt]
description = "Format with ruff"
run = "uv run ruff format ."

[tasks.tc]
description = "Typecheck with mypy"
run = "uv run mypy src/skillex"

[tasks.build]
description = "Build distribution"
run = "uv build"

[tasks.check]
description = "Run all quality checks: lint, typecheck, test"
depends = ["lint", "tc", "test"]
